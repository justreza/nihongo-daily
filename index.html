<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nihongo Daily - Final Fixed</title>
    <style>
        :root { --p: #1a2a6c; --s: #ffafbd; --bg: #f4f7f6; --ok: #28a745; --err: #dc3545; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; }
        
        .card { max-width: 500px; margin: auto; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; min-height: 90vh; display: flex; flex-direction: column; }
        
        header { background: var(--p); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--s); }
        .content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Grid Menu Utama */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .item { background: #fff; border: 1px solid #eee; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .item:active { transform: scale(0.95); background: #f9f9f9; }
        .item span { font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .item b { font-size: 0.85rem; color: var(--p); }

        /* Tombol */
        .btn { width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-p { background: var(--p); color: white; }
        .btn-g { background: #e9ecef; color: #495057; margin-bottom: 15px; }
        .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; }
        .btn-red { background: #fff1f1; color: var(--err); border: 1px solid var(--err); }

        /* List Belajar */
        .box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--s); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .jp { font-size: 1.15rem; font-weight: bold; color: var(--p); display: block; line-height: 1.8; }
        .id { color: #666; font-size: 0.9rem; border-top: 1px dashed #eee; margin-top: 8px; padding-top: 8px; display: block; }
        
        /* Kuis */
        .opt { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #f0f0f0; border-radius: 12px; background: white; text-align: left; font-size: 1rem; }
        .right { background: #d4edda !important; border-color: var(--ok) !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: var(--err) !important; color: #721c24; }
        
        .hidden { display: none !important; }
        #list-container { max-height: 65vh; overflow-y: auto; }
        ruby rt { color: #e83e8c; font-size: 0.55em; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h2 style="margin:0; font-size: 1.3rem;">NIHONGO DAILY</h2>
        <div style="font-size:0.75rem; opacity:0.9; margin-top:5px;">13 Kategori • 130 Kalimat • Full Hiragana</div>
    </header>

    <div id="m-home" class="content">
        <p style="font-weight:bold; color:var(--p); margin: 0 0 12px 0;">📍 Pilih Kategori Belajar:</p>
        <div id="m-grid" class="grid"></div>
        
        <hr style="width:100%; border:0; border-top:1px solid #eee; margin: 10px 0 20px 0;">
        
        <p style="font-weight:bold; color:var(--p); margin: 0 0 12px 0;">✍️ Uji Kemampuan (Kuis):</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="btn btn-p" onclick="startQuiz(10)">10</button>
            <button class="btn btn-p" onclick="startQuiz(25)">25</button>
            <button class="btn btn-p" onclick="startQuiz(50)">50</button>
        </div>
    </div>

    <div id="m-study" class="content hidden">
        <button class="btn btn-g" onclick="goHome()">⬅️ Kembali ke Menu</button>
        <h3 id="st-title" style="text-align:center; color:var(--p); margin-top:0;"></h3>
        <div id="list-container"></div>
    </div>

    <div id="m-quiz" class="content hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b id="q-prog" style="color:#888"></b>
            <b id="q-scr" style="color:var(--ok)">Skor: 0</b>
        </div>
        <div id="q-txt" style="font-size:1.2rem; font-weight:bold; text-align:center; margin: 20px 0; color:var(--p); min-height:60px;"></div>
        <div id="q-opts"></div>
        <div style="margin-top:20px;">
            <button id="next-btn" class="btn btn-p hidden" onclick="renderQuiz()">Lanjut ➔</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-outline" onclick="showResult()">Selesai</button>
                <button class="btn btn-red" onclick="resetQuiz()">Reset</button>
            </div>
        </div>
    </div>

    <div id="m-res" class="content hidden" style="text-align:center; justify-content: center;">
        <span style="font-size:4rem;">🏆</span>
        <h2 style="margin:10px 0">SKOR KAMU</h2>
        <div id="f-scr" style="font-size:5rem; font-weight:bold; color:var(--p)">0</div>
        <p id="f-msg" style="color:#666; margin-bottom:30px; line-height:1.5;"></p>
        <button class="btn btn-p" onclick="goHome()">Main Lagi</button>
    </div>
</div>

let qSet = [], qIdx = 0, score = 0, maxQ = 0;

function goHome() {
    hideAll();
    document.getElementById('m-home').classList.remove('hidden');
    const cats = [...new Set(db.map(x => x.c))];
    document.getElementById('m-grid').innerHTML = cats.map(c => {
        const item = db.find(x => x.c === c);
        return `<div class="item" onclick="goStudy('${c}')"><span>${item.i}</span><b>${c}</b></div>`;
    }).join('');
}

function goStudy(cat) {
    hideAll();
    document.getElementById('m-study').classList.remove('hidden');
    document.getElementById('st-title').innerText = "Kategori: " + cat;
    const items = db.filter(x => x.c === cat);
    document.getElementById('list-container').innerHTML = items.map(x => `
        <div class="box">
            <span class="jp">${x.j}</span>
            <span class="id">${x.t}</span>
        </div>
    `).join('');
}

function startQuiz(n) {
    maxQ = n;
    qSet = [...db].sort(() => 0.5 - Math.random()).slice(0, n);
    qIdx = 0; score = 0;
    hideAll();
    document.getElementById('m-quiz').classList.remove('hidden');
    renderQuiz();
}

function resetQuiz() {
    if(confirm("Ulangi kuis dari awal?")) startQuiz(maxQ);
}

function renderQuiz() {
    if(qIdx >= qSet.length) { showResult(); return; }
    const data = qSet[qIdx];
    document.getElementById('next-btn').classList.add('hidden');
    document.getElementById('q-prog').innerText = "SOAL " + (qIdx + 1) + " / " + qSet.length;
    document.getElementById('q-txt').innerText = data.t;
    
    let opts = [data];
    while(opts.length < 3) {
        let r = db[Math.floor(Math.random() * db.length)];
        if(!opts.some(o => o.j === r.j)) opts.push(r);
    }
    opts.sort(() => 0.5 - Math.random());
    
    document.getElementById('q-opts').innerHTML = opts.map(o => {
        const plain = o.j.replace(/<rt>.*?<\/rt>|<ruby>|<\/ruby>/g, "");
        return `<button class="opt" onclick="check(this, ${o.j === data.j})">${plain}</button>`;
    }).join('');
}

function check(btn, isCorrect) {
    const opts = document.querySelectorAll('.opt');
    opts.forEach(b => b.disabled = true);
    if(isCorrect) {
        btn.classList.add('right');
        score++;
    } else {
        btn.classList.add('wrong');
        const correctJp = qSet[qIdx].j.replace(/<rt>.*?<\/rt>|<ruby>|<\/ruby>/g, "");
        opts.forEach(b => { if(b.innerText === correctJp) b.classList.add('right'); });
    }
    document.getElementById('q-scr').innerText = "Skor: " + Math.round((score/(qIdx+1))*100);
    document.getElementById('next-btn').classList.remove('hidden');
    qIdx++;
}

function showResult() {
    hideAll();
    document.getElementById('m-res').classList.remove('hidden');
    const total = qIdx === 0 ? 0 : Math.round((score / qIdx) * 100);
    document.getElementById('f-scr').innerText = total;
    document.getElementById('f-msg').innerText = "Kamu menjawab benar " + score + " dari " + qIdx + " soal.\n" + (total >= 80 ? "Hebat! Pertahankan!" : "Ayo belajar lagi!");
}

function hideAll() {
    document.getElementById('m-home').classList.add('hidden');
    document.getElementById('m-study').classList.add('hidden');
    document.getElementById('m-quiz').classList.add('hidden');
    document.getElementById('m-res').classList.add('hidden');
}

goHome();
</script>
